signal_generator:
  length: 128
  method: 
    name: piecewise_linear
    n_peaks: 16
    peak_size_shape: 31
    peak_size_rate: 30 # mode is 1
    rng_seed: ../../../seeds/signal_gen_seeds.txt
    min_distance_between_peaks: 5.5
  noise:
    type: "gaussian"
    correlation: 0
    variance: 0.16
    rng_seed: ../../../seeds/noise_gen_seeds.txt
inference: 
  max_bands: 40
  n_sims: 64
  smooth_method: TP
  sim_method: residual boot
  rng_seed: ../../../seeds/posterior_sims_seeds.txt